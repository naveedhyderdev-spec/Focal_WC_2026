name: Score sync backstop

# Primary sync is cron-job.org every 5 minutes. This is only a BACKSTOP in
# case that external scheduler dies — runs every 6 hours at :07 (off the
# 5-minute grid so it never collides with the primary). The endpoint is
# idempotent: it rebuilds the calculated scores from the matches table + raw
# picks each run, with retries on transient feed errors.
on:
  schedule:
    - cron: '7 */6 * * *'   # 00:07, 06:07, 12:07, 18:07 UTC
  workflow_dispatch: {}      # manual "Run workflow" button

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger score sync
        run: |
          curl --fail-with-body -s -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://focal-wc-2026.vercel.app/api/cron/sync
